# Development-oriented stack. The app/worker services bind-mount the source
# and run with auto-reload. For production, drop the `volumes` + `command`
# overrides (the image's gunicorn CMD runs) and set ENVIRONMENT=production.
#
# Note: db/redis/rabbitmq ports are intentionally NOT published to the host,
# to avoid clashing with any services already running locally. They are
# reachable inside the compose network by service name (db, redis, rabbitmq).

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-barbershop}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-barbershop}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file: .env
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    ports:
      - "8000:8000"
    # Dev override: bind-mount source + auto-reload. The anonymous volume on
    # /app/.venv keeps the container's Linux venv from being shadowed by the
    # host's (possibly macOS) .venv.
    # When Alembic is added (Phase 12), prepend: alembic upgrade head &&
    volumes:
      - .:/app
      - /app/.venv
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - .:/app
      - /app/.venv
    command: celery -A app.core.celery_app:celery_app worker --loglevel=info

volumes:
  postgres_data:
